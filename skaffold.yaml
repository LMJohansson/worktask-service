apiVersion: skaffold/v4beta14
kind: Config
metadata:
  name: worktask-service

build:
  artifacts:
    # Quarkus's generated Dockerfile.jvm copies a prebuilt build/quarkus-app/ directory rather
    # than compiling from source, so a plain `docker build .` from a clean checkout would fail.
    # Wrap the Gradle build that produces it, then hand off to a normal docker build.
    #
    # eval "$(minikube docker-env)": unlike the built-in docker builder, Skaffold does NOT inject
    # the minikube docker daemon env into a custom build script — but it still inspects minikube's
    # daemon for the resulting image. Without this, `docker build` targets the host daemon, the
    # image never lands in minikube, and the build fails with "didn't produce an image with tag".
    # Point Docker at minikube's daemon so the image is built straight into the node.
    #
    # --provenance=false --sbom=false: BuildKit attaches attestations by default, which turn the
    # output into an OCI manifest list that minikube's classic (overlay2) image store can't load —
    # the build "succeeds" but the tag never registers. Disabling attestations yields a plain
    # single-platform image that loads and inspects cleanly.
    - image: worktask-service
      custom:
        buildCommand: eval "$(minikube docker-env)" && ./gradlew quarkusBuild -Dquarkus.package.jar.type=fast-jar && docker build --provenance=false --sbom=false -f src/main/docker/Dockerfile.jvm -t $IMAGE .
        dependencies:
          paths:
            - src/**
            - build.gradle.kts
            - gradle.properties
  local:
    push: false   # Skaffold builds against Minikube's own Docker daemon; no registry needed

manifests:
  rawYaml:
    - build/kubernetes/kubernetes.yml
    - k8s/namespace.yaml
    - k8s/strimzi/kafka-cluster.yaml
    - k8s/strimzi/kafka-topics.yaml
    # Confluent Schema Registry (cp-schema-registry) backed by the Strimzi Kafka
    # broker; see its header comment for the Kafka-backing-store and probe details.
    - k8s/confluent/schema-registry.yaml

deploy:
  kubectl: {}
  helm:
    releases:
      - name: worktask-postgresql
        remoteChart: oci://registry-1.docker.io/bitnamicharts/postgresql
        namespace: worktask
        createNamespace: true
        valuesFiles:
          - k8s/postgresql/values.yaml

# Pin services to stable local ports. The generated Service exposes port 80, so a bare
# `--port-forward` would otherwise assign random local ports. Pinning makes the addresses
# deterministic: http://localhost:8080 for the /graphql and /q/health smoke tests below,
# http://localhost:8081 for the Schema Registry, and localhost:9092 for the Kafka bootstrap.
portForward:
  - resourceType: service
    resourceName: worktask-service
    namespace: worktask
    port: 80
    localPort: 8080
  # Schema Registry — pin to localhost:8081, matching the dev default SCHEMA_REGISTRY_URL host:port.
  # Full REST access from the host (e.g. curl http://localhost:8081/subjects).
  - resourceType: service
    resourceName: worktask-schema-registry
    namespace: worktask
    port: 8081
    localPort: 8081
  # Strimzi Kafka bootstrap — pin to localhost:9092, matching the asyncapi development server.
  # NOTE: this makes localhost:9092 accept TCP (useful for reachability checks), but a producer/
  # consumer won't fully work from the host: the Strimzi listener is `type: internal`, so the
  # bootstrap response advertises in-cluster DNS broker addresses that don't resolve off-cluster.
  - resourceType: service
    resourceName: worktask-kafka-kafka-bootstrap
    namespace: worktask
    port: 9092
    localPort: 9092
