quarkus.application.name=worktask-service

# Kafka Streams
quarkus.kafka-streams.application-id=worktask-service
quarkus.kafka-streams.topics=${worktask.topics.command:work.tasks.worktask.public.worktask.command}
kafka-streams.processing.guarantee=exactly_once_v2

# Test profile runs its own Kafka Streams instance alongside dev mode (Continuous Testing) —
# isolate application-id and state.dir so RocksDB doesn't lock-collide with the dev instance
%test.quarkus.kafka-streams.application-id=worktask-service-test
%test.kafka-streams.state.dir=${java.io.tmpdir}/kafka-streams-test

# Dev Services — auto-create topics
quarkus.kafka.devservices.topic-partitions."work.tasks.worktask.public.worktask.command"=3
quarkus.kafka.devservices.topic-partitions."work.tasks.worktask.public.worktask.event"=3
quarkus.kafka.devservices.topic-partitions."work.tasks.worktask.public.worktask.compact"=3
quarkus.kafka.devservices.topic-partitions."work.tasks.worktask.private.worktask.dead-letter"=1

# Topics
worktask.topics.command=work.tasks.worktask.public.worktask.command
worktask.topics.event=work.tasks.worktask.public.worktask.event
worktask.topics.compact=work.tasks.worktask.public.worktask.compact
worktask.topics.dead-letter=work.tasks.worktask.private.worktask.dead-letter

# Schema Registry (Apicurio)
mp.messaging.connector.smallrye-kafka.schema.registry.url=${SCHEMA_REGISTRY_URL:http://localhost:8081}

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=update

# --- Minikube profile: runs in-cluster against Strimzi Kafka, Bitnami PostgreSQL/Apicurio ---
# (activated via QUARKUS_PROFILE=minikube, set as a Deployment env var below)
%minikube.quarkus.devservices.enabled=false
%minikube.kafka.bootstrap.servers=worktask-kafka-kafka-bootstrap.worktask.svc.cluster.local:9092
%minikube.quarkus.datasource.username=worktask
%minikube.quarkus.datasource.password=worktask
%minikube.quarkus.datasource.jdbc.url=jdbc:postgresql://worktask-postgresql.worktask.svc.cluster.local:5432/worktask

# Kubernetes manifest generation (quarkus-kubernetes) and container image (quarkus-container-image-docker)
quarkus.container-image.image=worktask-service:dev
quarkus.kubernetes.namespace=worktask
quarkus.kubernetes.image-pull-policy=IfNotPresent
quarkus.kubernetes.env.vars.quarkus-profile=minikube
# Mirrors the bare-host:port shape of the ${SCHEMA_REGISTRY_URL:http://localhost:8081}
# default above (no /apis/registry/vN suffix) — the Avro serde appends the API path itself
quarkus.kubernetes.env.vars.SCHEMA_REGISTRY_URL=http://worktask-apicurio-registry.worktask.svc.cluster.local:8080
quarkus.kubernetes.resources.requests.memory=512Mi
quarkus.kubernetes.resources.requests.cpu=250m
quarkus.kubernetes.resources.limits.memory=1Gi
quarkus.kubernetes.resources.limits.cpu=1000m
# wait-for-deps init container: Kafka Streams (admin client) and Hibernate (schema update) both
# connect at startup. On a fresh cluster Strimzi's Kafka bootstrap Service may not resolve yet,
# and Kafka clients treat a zero-address bootstrap as a fatal ConfigException ("No resolvable
# bootstrap urls") rather than retrying — so the pod crash-loops and Skaffold aborts the dev loop.
# Block startup until Kafka, PostgreSQL, and Apicurio accept TCP connections.
quarkus.kubernetes.init-containers.wait-for-deps.image=busybox:1.37
quarkus.kubernetes.init-containers.wait-for-deps.command=sh,-c
quarkus.kubernetes.init-containers.wait-for-deps.arguments=until nc -z worktask-kafka-kafka-bootstrap 9092 && nc -z worktask-postgresql 5432 && nc -z worktask-apicurio-registry 8080; do echo waiting for deps; sleep 3; done
