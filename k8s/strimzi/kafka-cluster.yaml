# Single-node KRaft Kafka cluster for local Minikube development.
# Requires the Strimzi Kafka Operator and its CRDs (Kafka, KafkaNodePool, KafkaTopic, ...).
# Skaffold installs the operator via the `strimzi-operator` config in skaffold.yaml,
# which `worktask-service` declares as a `requires` dependency purely for deploy
# ordering — Skaffold guarantees required-config deploys complete first, ensuring
# the CRDs exist before these custom resources are applied.
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: worktask
  labels:
    strimzi.io/cluster: worktask-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: worktask-kafka
  namespace: worktask
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # `version` intentionally omitted — the operator defaults to the latest Kafka version
    # it supports. Pin it explicitly (matching `kubectl get kafkaversions`) if you need
    # a specific broker version.
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
